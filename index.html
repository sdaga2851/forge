<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#111318"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Forge"/>
<meta name="description" content="Forge your habits, tasks, finance, and goals — all in one place"/>
<title>Forge</title>

<link rel="manifest" href="/manifest.json"/>
<link rel="icon" type="image/png" sizes="72x72" href="/icon-72.png"/>
<link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png"/>
<link rel="icon" type="image/png" sizes="128x128" href="/icon-128.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="384x384" href="/icon-384.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"/>
<link rel="apple-touch-icon" href="/icon-180.png"/>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:0;font-family:'Inter',system-ui,sans-serif;background:#F9FAFB;
  overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
#root{min-height:100vh;min-height:100dvh;}
input,select,textarea,button{font-family:inherit;font-size:16px;}
textarea{resize:vertical;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="/app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
let dP = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); dP = e; });
window.installApp = () => { if (dP) { dP.prompt(); dP.userChoice.then(() => { dP = null; }); } };
</script>
</body>
</html>
